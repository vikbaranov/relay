# Default-deny all ingress and egress for user runtime pods.
# Only allow: DNS, egress to control plane, egress to LLM endpoints.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-user-pods
  namespace: sandbox
spec:
  podSelector:
    matchLabels:
      ai.relay.io/part-of: zeroclaw-runtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound only from the controller
    - from:
        - podSelector:
            matchLabels:
              app: relay-controller
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # LLM providers and tools — restrict further in production
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
---
# Controller can reach user pods and the internet (Mattermost WS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controller-egress
  namespace: sandbox
spec:
  podSelector:
    matchLabels:
      app: relay-controller
  policyTypes:
    - Egress
  egress:
    - {} # unrestricted outbound; tighten per environment
