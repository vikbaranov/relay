apiVersion: v1
kind: Secret
metadata:
  name: ops-agent-controller
  namespace: ai-assistants
type: Opaque
stringData:
  MATTERMOST_URL: "https://chat.example.com"
  MATTERMOST_PORT: "443"
  MATTERMOST_TEAM: "myteam"
  MATTERMOST_BOT_TOKEN: "REPLACE_ME"
  MATTERMOST_BOT_USERNAME: "ops-agent"
  K8S_NAME_SECRET: "REPLACE_WITH_RANDOM_32_BYTE_HEX"
  K8S_NAMESPACE: "ai-assistants"
  K8S_MODE: "incluster"
  ZEROCLAW_IMAGE: "ghcr.io/zeroclaw-labs/zeroclaw:latest"
  USER_PVC_SIZE: "5Gi"
  IDLE_TIMEOUT_SECONDS: "3600"
