apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-controller
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay-controller
  template:
    metadata:
      labels:
        app: relay-controller
    spec:
      serviceAccountName: relay-controller
      # securityContext:
      #   runAsNonRoot: false
      #   seccompProfile:
      #     type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/YOUR_ORG/relay:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: relay-controller
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          # securityContext:
          #   allowPrivilegeEscalation: false
          #   capabilities:
          #     drop: ["ALL"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: relay-controller
  namespace: sandbox
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: relay-controller
