apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ops-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ops-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, services, persistentvolumeclaims, configmaps, events, secrets]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, patch, delete]
