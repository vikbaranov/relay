apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ops-agent.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ops-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  MATTERMOST_URL: {{ .Values.config.mattermost.url | quote }}
  MATTERMOST_PORT: {{ .Values.config.mattermost.port | toString | quote }}
  MATTERMOST_TEAM: {{ .Values.config.mattermost.team | quote }}
  MATTERMOST_BOT_TOKEN: {{ .Values.config.mattermost.botToken | quote }}
  MATTERMOST_BOT_USERNAME: {{ .Values.config.mattermost.botUsername | quote }}
  MATTERMOST_THREAD_REPLIES: {{ .Values.config.mattermost.threadReplies | toString | quote }}
  K8S_NAMESPACE: {{ .Values.config.k8s.namespace | quote }}
  K8S_MODE: {{ .Values.config.k8s.mode | quote }}
  {{- if .Values.config.k8s.kubeconfigPath }}
  K8S_KUBECONFIG_PATH: {{ .Values.config.k8s.kubeconfigPath | quote }}
  {{- end }}
  K8S_NAME_SECRET: {{ .Values.config.k8s.nameSecret | quote }}
  OPENAI_API_KEY: {{ .Values.config.llm.apiKey | quote }}
  OPENAI_BASE_URL: {{ .Values.config.llm.baseUrl | quote }}
  OPENAI_MODEL: {{ .Values.config.llm.model | quote }}
  ZEROCLAW_IMAGE: {{ .Values.config.zeroclaw.image | quote }}
  ZEROCLAW_PORT: {{ .Values.config.zeroclaw.port | toString | quote }}
  ZEROCLAW_DATA_PATH: {{ .Values.config.zeroclaw.dataPath | quote }}
  ZEROCLAW_CONFIGMAP: {{ .Values.config.zeroclaw.configmap | quote }}
  ZEROCLAW_CONFIG_KEY: {{ .Values.config.zeroclaw.configKey | quote }}
  ZEROCLAW_CONFIG_MOUNT: {{ .Values.config.zeroclaw.configMount | quote }}
  ZEROCLAW_CPU_REQUEST: {{ .Values.config.zeroclaw.cpuRequest | quote }}
  ZEROCLAW_CPU_LIMIT: {{ .Values.config.zeroclaw.cpuLimit | quote }}
  ZEROCLAW_MEMORY_REQUEST: {{ .Values.config.zeroclaw.memoryRequest | quote }}
  ZEROCLAW_MEMORY_LIMIT: {{ .Values.config.zeroclaw.memoryLimit | quote }}
  USER_PVC_SIZE: {{ .Values.config.storage.pvcSize | quote }}
  {{- if .Values.config.storage.storageClass }}
  USER_PVC_STORAGE_CLASS: {{ .Values.config.storage.storageClass | quote }}
  {{- end }}
  IDLE_TIMEOUT_SECONDS: {{ .Values.config.lifecycle.idleTimeoutSeconds | toString | quote }}
  POD_READY_TIMEOUT_SECONDS: {{ .Values.config.lifecycle.podReadyTimeoutSeconds | toString | quote }}
  REAPER_INTERVAL_SECONDS: {{ .Values.config.lifecycle.reaperIntervalSeconds | toString | quote }}
  WEBHOOK_HOST_PORT: {{ .Values.config.lifecycle.webhookHostPort | toString | quote }}
  WEBHOOK_PUBLIC_URL: {{ .Values.config.lifecycle.webhookPublicUrl | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | toString | quote }}
  SSL_VERIFY: {{ .Values.config.sslVerify | toString | quote }}
